name: Pipeline de Deploy e DataOps (CD)

on:
  # Este workflow só roda se o workflow de "Validar Dados" terminar com SUCESSO
  workflow_run:
    workflows: ["Pipeline de Validação de Dados"]
    types:
      - completed

jobs:
  deploy_dados:
    runs-on: ubuntu-latest
    # Garante que só vai rodar se o resultado do workflow anterior foi de fato 'success'
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
    - name: Pegar o código do repositório
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar Pandas
      run: pip install pandas

    - name: Simular Deploy para Produção (Data Lake / DW)
      run: |
        echo "========================================================="
        echo " INICIANDO DEPLOY DOS DADOS EM PRODUÇÃO..."
        echo "========================================================="
        echo "Copiando 'dados.csv' validado para o ambiente produtivo..."
        # Simulando um upload para AWS S3, Google Cloud Storage ou BigQuery
        sleep 2
        echo " Dados implantados com sucesso no Data Lake!"

    - name: Gerar Relatório de Entrega de Dados (DataOps Metadata)
      run: |
        echo "========================================================="
        echo "GERANDO METADADOS DO PIPELINE (DATAOPS)"
        echo "========================================================="
        python -c "
        import pandas as pd
        try:
            df = pd.read_csv('dados.csv')
            print(f'➡ Data do Deploy: {pd.Timestamp.now().strftime(\"%Y-%m-%d %H:%M:%S\")}')
            print(f'➡ Total de Linhas Processadas com Sucesso: {len(df)}')
            print(f'➡ Volumetria Financeira Total: R$ {df[\"valor\"].sum():.2f}')
            print(f'➡ Status do Pipeline: Saudável (Healthy)')

            except Exception as e:
                print('Erro ao gerar relatório:', e)        "
        echo "========================================================="

    - name: Notificar Sucesso da Esteira
      run: |
        echo "[Notificação] Pipeline concluído! Dados atualizados e disponíveis para o time de BI/Negócios."